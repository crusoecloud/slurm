- name: Check if /home is mounted
  debug: msg="/home is mounted"
  with_items: "{{ ansible_mounts }}"
  register: home_mount_exists
  when: item.mount == "/home"
  delegate_to: slurm-login-node-0
  run_once: true

- name: Mount slurm_home_disk to /mnt/home
  ansible.posix.mount:
    src: "{{ vast_nfs_server_host }}:/volumes/{{ slurm_home_disk_id }}"
    path: /mnt/home
    opts: "vers=3,nconnect=16,spread_reads,spread_writes,remoteports={{ vast_nfs_remoteports }},_netdev,nofail,x-systemd.automount,x-systemd.idle-timeout=30"
    fstype: nfs
    state: mounted
  when: home_mount_exists is skipped
  delegate_to: slurm-login-node-0
  run_once: true

- name: Copy /home to /mnt/home
  command: "rsync -a /home/ /mnt/home"
  when: home_mount_exists is skipped
  delegate_to: slurm-login-node-0
  run_once: true

- name: Unmount slurm_home_disk from /mnt/home
  ansible.posix.mount:
    path: /mnt/home
    state: unmounted
  delegate_to: slurm-login-node-0
  run_once: true

- name: Mount vastnfs slurm_home_disk
  ansible.posix.mount:
    src: "{{ vast_nfs_server_host }}:/volumes/{{ slurm_home_disk_id }}"
    path: /home
    opts: "vers=3,nconnect=16,spread_reads,spread_writes,remoteports={{ vast_nfs_remoteports }},_netdev,nofail,x-systemd.automount,x-systemd.idle-timeout=30"
    state: mounted
    fstype: nfs